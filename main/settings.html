<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Settings</title>
    <script
      type="module"
      src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"
    ></script>
    <link rel="stylesheet" href="settings.css">
  </head>
  <body>
    <div class="sidebar">
      <div class="sidebar-header">
        <button id="back-btn">
          <ion-icon name="chevron-back-outline"></ion-icon> Back
        </button>
      </div>
      <button class="menu-item active" data-section="general">
        <ion-icon name="settings-outline"></ion-icon> General
      </button>
      <button class="menu-item" data-section="personalization">
        <ion-icon name="color-palette-outline"></ion-icon> Personalization
      </button>
      <button class="menu-item" data-section="about">
        <ion-icon name="information-circle-outline"></ion-icon> About
      </button>
    </div>

    <div class="main-content">
      <!-- General Section -->
      <div id="general" class="content-section active">
        <h1>General</h1>
        <div class="settings-group">
          <div class="settings-row">
            <span class="row-label">Language</span>
            <select name="languages" id="languages">
              <option value="en">English</option>
              <option value="id">Indonesia</option>
              <option value="de">Deutsch</option>
              <option value="jp">日本語</option>
              <option value="fr">Français</option>
              <option value="es">Español</option>
              <option value="it">Italiano</option>
              <option value="ru">Русский</option>
            </select>
          </div>
          <div class="settings-row" id="delete-data-row">
            <span class="row-label danger-text">Delete All User Data</span>
          </div>
        </div>
      </div>

      <!-- Personalization Section -->
      <div id="personalization" class="content-section">
        <h1>Personalization</h1>
        <div class="settings-group">
          <div class="settings-row">
            <span class="row-label">Dark Mode</span>
            <input type="checkbox" id="dark-mode-toggle" />
          </div>
          <div class="settings-row" id="wallpaper-row">
            <span class="row-label">Change Wallpaper</span>
            <button>Select Image</button>
            <input
              type="file"
              id="bg-upload"
              accept="image/*"
              style="display: none"
            />
          </div>
          <div class="settings-row" id="reset-bg-row">
            <span class="row-label">Reset Wallpaper</span>
          </div>
          <div class="settings-row">
            <span class="row-label" id="accent-color">Accent Color</span>
            <input
              type="color"
              id="accent-color-picker"
              value="#007aff"
              style="width: 50px; height: 40px"
            />
          </div>
          <div class="settings-row" id="opacity-title">
            <span class="row-label">Container Opacity</span>
            <div style="display: flex; align-items: center; gap: 12px">
              <input
                type="range"
                id="opacity-slider"
                min="0.1"
                max="1"
                step="0.1"
                value="1"
              />
              <span id="opacity-value" style="min-width: 35px">100%</span>
            </div>
          </div>
          <div class="settings-row" id="reset-settings-row">
            <span class="row-label danger-text">Reset Settings</span>
          </div>
        </div>
      </div>

      <!-- About Section -->
      <div id="about" class="content-section">
        <h1>About</h1>
        <div class="settings-group">
          <div class="settings-row">
            <span class="row-label">Version</span>
            <span style="color: var(--text-secondary)">2.2.0</span>
          </div>
          <div class="settings-row" id="legal-row">
            <span class="row-label">Legal / License</span>
          </div>
        </div>
      </div>
    </div>

    <script src="settings.js"></script>
  </body>
</html>
